name: Terraform CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  TF_VERSION: "1.7.0"
  AWS_REGION: "us-east-1"

jobs:
  terraform:
    name: Terraform Validate & Plan
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Configure AWS credentials from GitHub Secrets
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 3. Install Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # 4. Check formatting
      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: false

      # 5. Initialize (downloads provider)
      - name: Terraform Init
        run: terraform init

      # 6. Validate configuration
      - name: Terraform Validate
        run: terraform validate

      # 7. tfsec security scan
      - name: Run tfsec Security Scan
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          soft_fail: true   # Won't block pipeline, but shows findings

      # 8. Terraform Plan (on PRs and pushes)
      - name: Terraform Plan
        run: terraform plan -no-color -out=tfplan
        env:
          TF_VAR_region: ${{ env.AWS_REGION }}

      # 9. Comment plan output on PR
      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const plan = execSync('terraform show -no-color tfplan').toString();
            const output = `#### Terraform Plan 📋
            \`\`\`\n${plan}\n\`\`\`
            *Pushed by: @${{ github.actor }}*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });