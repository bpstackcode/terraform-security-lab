name: Terraform CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  TF_VERSION: "1.7.0"
  AWS_REGION: "us-east-1"

jobs:
  terraform:
    name: Terraform Validate & Plan
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Configure AWS credentials from GitHub Secrets
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 3. Install Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # 4. Check formatting
      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      # 5. Initialize (downloads provider)
      - name: Terraform Init
        id: init
        run: terraform init

      # 6. Validate configuration
      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      # 7. tfsec security scan
      - name: Run tfsec Security Scan
        id: tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          soft_fail: true
          format: sarif
          sarif_file: tfsec.sarif

      # 8. Upload tfsec SARIF to GitHub Security tab
      - name: Upload tfsec SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: tfsec.sarif

      # 9. Terraform Plan
      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan 2>&1 | tee plan_output.txt
        env:
          TF_VAR_region: ${{ env.AWS_REGION }}
        continue-on-error: true

      # 10. Write Job Summary (shows up in GitHub Actions UI)
      - name: Write Job Summary
        if: always()
        run: |
          echo "## 🔐 Terraform Security Lab - Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🎨 Terraform Format | ${{ steps.fmt.outcome == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ⚙️  Terraform Init   | ${{ steps.init.outcome == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ✔️  Terraform Validate | ${{ steps.validate.outcome == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 tfsec Security Scan | ${{ steps.tfsec.outcome == 'success' && '✅ Passed' || '⚠️ Findings (check Security tab)' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📋 Terraform Plan   | ${{ steps.plan.outcome == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 Terraform Plan Output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat plan_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 🛡️ Security findings uploaded to the **Security tab** (SARIF format)" >> $GITHUB_STEP_SUMMARY
          echo "> 👤 Triggered by: **${{ github.actor }}** on branch **${{ github.ref_name }}**" >> $GITHUB_STEP_SUMMARY

      # 11. Comment plan output on PR
      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('plan_output.txt', 'utf8');
            const output = `## 🔐 Terraform Plan Results
            | Step | Status |
            |------|--------|
            | 🎨 Format | \`${{ steps.fmt.outcome }}\` |
            | ✔️ Validate | \`${{ steps.validate.outcome }}\` |
            | 🔍 tfsec | \`${{ steps.tfsec.outcome }}\` |
            | 📋 Plan | \`${{ steps.plan.outcome }}\` |

            <details><summary>📋 Show Plan Output</summary>

            \`\`\`terraform
            ${plan}
            \`\`\`
            </details>

            > 👤 Pushed by @${{ github.actor }} | 🔀 Branch: \`${{ github.ref_name }}\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });